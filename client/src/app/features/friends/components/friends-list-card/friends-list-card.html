<article class="friends-card friends-list-card">
  @if (!friends().length) {
    <p class="friends-card__state">
      No friends yet. Send and accept requests to build your circle.
    </p>
  } @else {
    <div class="friends-list__toolbar">
      <p class="friends-list__count">{{ friends().length }} friends</p>
      <div class="friends-list__view-switch" role="tablist" aria-label="Friends list view">
        <button
          type="button"
          class="friends-list__view-btn"
          aria-label="List view"
          title="List view"
          [class.is-active]="viewMode() === 'list'"
          (click)="setViewMode('list')"
        >
          <span class="material-symbols-rounded" aria-hidden="true">view_list</span>
        </button>
        <button
          type="button"
          class="friends-list__view-btn"
          aria-label="Grid view"
          title="Grid view"
          [class.is-active]="viewMode() === 'grid'"
          (click)="setViewMode('grid')"
        >
          <span class="material-symbols-rounded" aria-hidden="true">grid_view</span>
        </button>
      </div>
    </div>

    <ul class="friends-list" [class.friends-list--grid]="viewMode() === 'grid'">
      @for (friend of friends(); track friend.id) {
        <li class="friends-list__item" (click)="openProfile.emit(friend.username)">
          <div class="friends-list__identity">
            <img
              [src]="friend.avatar || '/mascots/profile-placeholder.png'"
              alt="Friend avatar"
              loading="lazy"
            />

            <div>
              <strong>{{ displayName(friend) }}</strong>
              <small>@{{ friend.username }} · {{ friend.status || 'No status yet' }}</small>
            </div>
          </div>

          <div class="friends-list__actions">
            <button
              type="button"
              class="friends-list__icon-btn"
              (click)="$event.stopPropagation(); openChat.emit(friend.username)"
            >
              <span class="material-symbols-rounded" aria-hidden="true">chat</span>
            </button>
            <button
              type="button"
              class="friends-list__icon-btn friends-list__icon-btn--danger"
              (click)="$event.stopPropagation(); removeFriend.emit(friend.username)"
            >
              <span class="material-symbols-rounded" aria-hidden="true">delete</span>
            </button>
          </div>
        </li>
      }
    </ul>
  }
</article>
