<section class="telegram-shell">
  <div class="telegram-card">
    <p class="telegram-kicker">Telegram auth</p>

    @if (isLoading) {
      <h1>Processing</h1>
    } @else {
      <h1>{{ isSuccess ? 'Connected' : 'Need attention' }}</h1>
    }

    <p class="telegram-copy">{{ message }}</p>

    <div class="telegram-actions">
      <a routerLink="/login" class="telegram-button">Back to login</a>
      <a routerLink="/" class="telegram-button telegram-button--ghost">Home</a>
    </div>
  </div>
</section>
