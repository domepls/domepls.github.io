<article class="dashboard-card">
  <h2>Status distribution</h2>
  <div class="dashboard-status">
    @for (slice of slices; track slice.key) {
      <div class="dashboard-status__row">
        <div class="dashboard-status__head">
          <span>{{ slice.label }}</span>
          <span>{{ slice.count }}</span>
        </div>
        <div class="dashboard-status__track">
          <div
            class="dashboard-status__bar"
            [ngClass]="barClass(slice.key)"
            [style.width.%]="slice.percent"
          ></div>
        </div>
      </div>
    }
  </div>
</article>
