<div
  style="
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: 'Inter', sans-serif;
    margin: 0;
    padding: 1rem;
  "
>
  <div
    style="
      text-align: center;
      background: white;
      padding: 3rem;
      border-radius: 1rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 500px;
      width: 100%;
    "
  >
    <h1 style="color: #333; margin-bottom: 1rem; font-size: 2rem; margin-top: 0">
      DoMePls {{ title() }}
    </h1>

    @if (error()) {
      <div
        style="
          background: #f8d7da;
          color: #721c24;
          padding: 1rem;
          border-radius: 0.5rem;
          border-left: 4px solid #721c24;
          margin: 1rem 0;
        "
      >
        {{ error() }}
      </div>
    } @else {
      <div>
        <p style="color: #666; margin-bottom: 1rem; margin-top: 0">Backend Response:</p>
        <div
          style="
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 0.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            margin: 1.5rem 0;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
          "
        >
          {{ message() }}
        </div>
        <p style="color: #666; font-size: 0.9rem; margin-top: 1rem; margin-bottom: 0">
          ✅ Successfully connected to backend!
        </p>
      </div>
    }
  </div>

  <router-outlet />
</div>
