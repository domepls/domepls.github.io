<nav class="navbar">
  <a class="brand" routerLink="/" aria-label="Go to DoMePls home page">
    <span class="logo-frame">
      <img src="/IMG_3618.PNG?v=2" alt="DoMePls logo" />
    </span>
    <span>DoMePls</span>
  </a>

  <div class="nav-links">
    <a class="nav-dashboard" routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    <a class="nav-projects" routerLink="/projects" routerLinkActive="active">Projects</a>
    <a class="nav-tasks" routerLink="/tasks" routerLinkActive="active">Tasks</a>
  </div>

  <div class="more-nav">
    <button
      class="more-button"
      type="button"
      [class.open]="menuOpen()"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Open navigation menu"
      (click)="toggleMenu()"
    >
      More
      <span>⌄</span>
    </button>

    @if (menuOpen()) {
      <div class="more-menu">
        <a class="menu-dashboard" routerLink="/dashboard" routerLinkActive="active" (click)="closeMenu()">Dashboard</a>
        <a class="menu-projects" routerLink="/projects" routerLinkActive="active" (click)="closeMenu()">Projects</a>
        <a class="menu-tasks" routerLink="/tasks" routerLinkActive="active" (click)="closeMenu()">Tasks</a>
      </div>
    }
  </div>

  <div class="auth-links">
    <button
      class="theme-toggle"
      type="button"
      [class.dark]="theme() === 'dark'"
      [attr.aria-label]="theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      (click)="toggleTheme()"
    >
      <span class="toggle-track">
        <span class="toggle-orb">
          <span class="sun">☀</span>
          <span class="moon">●</span>
        </span>
      </span>
    </button>

    @if (isAuthenticated()) {
      <a class="profile-link" routerLink="/profile" routerLinkActive="active">My Profile</a>
    } @else {
      <a routerLink="/login" routerLinkActive="active">Sign in</a>
      <a class="register-link" routerLink="/register" routerLinkActive="active">Sign up</a>
    }
  </div>
</nav>
