<section class="workspace-page profile-page">
  <header class="workspace-top">
    <div>
      <p class="workspace-kicker">My profile</p>
      <h1>Aruzhan</h1>
      <span>pls do me 👉👈</span>
    </div>

    <button class="logout-button" type="button" (click)="logout()">Logout</button>
  </header>

  <div class="profile-grid">
    <aside class="workspace-card profile-summary">
      <label class="avatar-picker">
        <img src="/IMG_3618.PNG?v=2" alt="Profile avatar" />
        <input type="file" accept="image/*" />
        <span>Change avatar</span>
      </label>

      <h2>Aruzhan</h2>
      <p>@aru</p>

      <div class="profile-stats">
        <article>
          <strong>450</strong>
          <span>points</span>
        </article>
        <article>
          <strong>7</strong>
          <span>streak</span>
        </article>
      </div>
    </aside>

    <section class="workspace-card profile-editor">
      <div class="card-heading">
        <div>
          <p>Edit profile</p>
          <h2>Public info</h2>
        </div>
      </div>

      <form class="profile-form">
        <label>
          <span>Name</span>
          <input name="displayName" value="Aruzhan" />
        </label>
        <label>
          <span>Username</span>
          <input name="username" value="aru" />
        </label>
        <label>
          <span>Email</span>
          <input name="email" type="email" value="ygg@example.com" />
        </label>
        <label>
          <span>Status</span>
          <input name="status" value="pls do me 👉👈" />
        </label>
        <label class="full-field">
          <span>Bio</span>
          <textarea name="bio" rows="4">Trying to be productive, but in a cute way.</textarea>
        </label>

        <button class="workspace-button" type="button">Save profile</button>
      </form>
    </section>
  </div>

  <div class="profile-grid lower-profile-grid">
    <section class="workspace-card security-card">
      <div class="card-heading">
        <div>
          <p>Security</p>
          <h2>Account safety</h2>
        </div>
      </div>

      <form class="profile-form">
        <label>
          <span>Current password</span>
          <input name="currentPassword" type="password" />
        </label>
        <label>
          <span>New password</span>
          <input name="newPassword" type="password" />
        </label>
        <label class="security-toggle">
          <input name="twoFactorEnabled" type="checkbox" />
          <span>Enable two-factor reminder</span>
        </label>
        <button class="workspace-button" type="button">Update security</button>
      </form>
    </section>

    <section class="workspace-card">
      <div class="card-heading">
        <div>
          <p>Achievements</p>
          <h2>Tiny flex</h2>
        </div>
      </div>
      <div class="badge-row">
        <span>7d</span>
        <span>+25</span>
        <span>pls</span>
      </div>
    </section>

    <section class="workspace-card">
      <div class="card-heading">
        <div>
          <p>Recent activity</p>
          <h2>What happened</h2>
        </div>
      </div>
      <div class="activity-list">
        <article>
          <span class="activity-dot purple-dot"></span>
          <div>
            <strong>Updated profile mood</strong>
            <small>Just now</small>
          </div>
        </article>
        <article>
          <span class="activity-dot gold-dot"></span>
          <div>
            <strong>Created a task</strong>
            <small>Today</small>
          </div>
        </article>
      </div>
    </section>
  </div>
</section>
