<section class="tiny-wins" id="tiny-wins">
  <div class="tiny-wins__intro">
    <p>Tiny Wins</p>
    <h2>Small moments that make getting things done feel good.</h2>
  </div>

  <div class="tiny-wins__grid">
    <article>
      <div class="tiny-wins__media">
        <img
          src="/mascots/guide.png"
          alt="Starter mascot"
          loading="lazy"
          (error)="onMascotError($event)"
        />
      </div>
      <h3>Starter</h3>
      <p>Helps you begin when the list feels empty or overwhelming.</p>
    </article>

    <article>
      <div class="tiny-wins__media tiny-wins__media--alt">
        <img
          src="/mascots/cheer.png"
          alt="Cheer mascot"
          loading="lazy"
          (error)="onMascotError($event)"
        />
      </div>
      <h3>Cheer</h3>
      <p>Celebrates progress, big or small - because every task counts.</p>
    </article>

    <article>
      <div class="tiny-wins__media tiny-wins__media--soft">
        <img
          src="/mascots/reminder.png"
          alt="Reminder mascot"
          loading="lazy"
          (error)="onMascotError($event)"
        />
      </div>
      <h3>Reminder</h3>
      <p>A gentle nudge when things are left behind.</p>
    </article>
  </div>
</section>
