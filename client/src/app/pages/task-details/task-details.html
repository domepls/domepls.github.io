<section class="workspace-page">
  <header class="workspace-top">
    <div>
      <a class="back-link" routerLink="/tasks">← Tasks</a>
      <p class="workspace-kicker">Task details</p>
      <h1>Finish one thing</h1>
      <span>Just one. We are being realistic, not heroic.</span>
    </div>

    <button class="workspace-button" type="button">Save changes</button>
  </header>

  <div class="detail-grid">
    <section class="workspace-card wide-card">
      <div class="card-heading">
        <div>
          <p>Editable task</p>
          <h2>Details</h2>
        </div>
        <span class="status-pill in-progress">In progress</span>
      </div>

      <form class="task-form">
        <label>
          <span>Title</span>
          <input value="Finish one thing. Just one." />
        </label>
        <label>
          <span>Description</span>
          <textarea rows="5">Choose the smallest useful task and complete it before motivation escapes.</textarea>
        </label>
      </form>
    </section>

    <aside class="workspace-card">
      <div class="card-heading">
        <div>
          <p>Status</p>
          <h2>Move task</h2>
        </div>
      </div>

      <div class="status-actions">
        <button type="button">To do</button>
        <button class="active-status" type="button">In progress</button>
        <button type="button">Done</button>
      </div>
    </aside>
  </div>

  <section class="workspace-card comments-card">
    <div class="card-heading">
      <div>
        <p>Comments</p>
        <h2>Discussion</h2>
      </div>
    </div>

    <div class="comment-list">
      <article>
        <span>A</span>
        <div>
          <strong>Aruzhan</strong>
          <p>I will do it after one dramatic coffee.</p>
        </div>
      </article>
      <article>
        <span>D</span>
        <div>
          <strong>DoMePls</strong>
          <p>Bestie, the task is still looking at you.</p>
        </div>
      </article>
    </div>

    <label class="comment-box">
      <span>Add comment</span>
      <textarea rows="3" placeholder="Write something useful-ish..."></textarea>
    </label>
  </section>
</section>
