name: Render ping

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allows manual triggering

jobs:
  curl-website:
    runs-on: ubuntu-latest

    steps:
      - name: Run cURL on Website
        run: |
          curl -LfsS \
            --retry 3 \
            --retry-delay 5 \
            --connect-timeout 10 \
            --max-time 30 \
            https://domepls.onrender.com/api/health/
