name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "What to deploy"
        required: true
        default: both
        type: choice
        options:
          - frontend
          - backend
          - both

concurrency:
  group: manual-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_frontend:
    if: inputs.deploy_target == 'frontend' || inputs.deploy_target == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build Angular app
        working-directory: client
        run: npm run build -- --configuration production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist/client/browser

  deploy_frontend:
    if: inputs.deploy_target == 'frontend' || inputs.deploy_target == 'both'
    runs-on: ubuntu-latest
    needs: build_frontend
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  trigger_render:
    if: inputs.deploy_target == 'backend' || inputs.deploy_target == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
