name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "What to deploy"
        required: true
        default: both
        type: choice
        options:
          - frontend
          - backend
          - both

concurrency:
  group: manual-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  trigger_render_frontend:
    if: inputs.deploy_target == 'frontend' || inputs.deploy_target == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render frontend deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}"

  trigger_render_backend:
    if: inputs.deploy_target == 'backend' || inputs.deploy_target == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render backend deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}"
